<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inventario Displays</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #13151a; color: #f0f0f0; min-height: 100vh; }
  .screen { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
  .screen.active { display: block; }

  #login { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; gap: 14px; }
  #login h1 { text-align: center; color: #00bf8f; font-size: 24px; margin-bottom: 10px; }
  input[type=text], input[type=password] { width: 100%; padding: 13px; border-radius: 8px; border: none; background: #1e2230; color: #f0f0f0; font-size: 16px; }
  .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
  .btn-verde { background: #00bf8f; color: #021a12; }
  .btn-azul  { background: #2e6fd4; color: #fff; }
  .btn-gris  { background: #1e2230; color: #f0f0f0; }
  .error { color: #f04040; text-align: center; font-size: 14px; min-height: 20px; }

  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .header h2 { font-size: 18px; flex: 1; }
  .back { background: #1e2230; border: none; color: #f0f0f0; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 18px; }
  .search { width: 100%; padding: 11px; border-radius: 8px; border: none; background: #1e2230; color: #f0f0f0; font-size: 15px; margin-bottom: 10px; }
  .tienda-item { background: #1e2230; padding: 14px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
  .subtexto { color: #8a9099; font-size: 13px; margin-bottom: 10px; }

  .tabla-header { display: grid; grid-template-columns: 1fr 50px 60px 90px; gap: 4px; padding: 6px 4px; border-bottom: 1px solid #2a2f3e; margin-bottom: 6px; }
  .tabla-header span { font-size: 11px; color: #00bf8f; font-weight: bold; text-align: center; }
  .tabla-header span:first-child { text-align: left; }
  .fila { display: grid; grid-template-columns: 1fr 50px 60px 90px; gap: 4px; align-items: center; background: #1e2230; border-radius: 6px; padding: 8px 4px; margin-bottom: 4px; }
  .fila .nombre { font-size: 11px; padding-left: 4px; word-break: break-word; }
  .fila .cant { font-size: 13px; font-weight: bold; text-align: center; }
  .cant.cero { color: #f04040; }
  .btn-foto { padding: 6px; border-radius: 6px; border: none; background: #2a3240; color: #f0f0f0; cursor: pointer; font-size: 16px; width: 100%; }
  .btn-foto.ok { background: #00bf8f; color: #021a12; }
  .fila textarea { font-size: 11px; padding: 4px; border-radius: 6px; border: none; background: #13151a; color: #f0f0f0; resize: none; height: 38px; width: 100%; }
  .btn-enviar { margin-top: 12px; }
  .status-envio { text-align: center; font-size: 13px; color: #8a9099; margin-top: 8px; min-height: 20px; }

  /* TABS SUPERVISOR */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #2a2f3e; }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: #8a9099; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.activo { color: #00bf8f; border-bottom: 2px solid #00bf8f; font-weight: bold; }

  /* CHIPS */
  .chips { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .chip { flex: 1; padding: 10px 8px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; min-width: 80px; }
  .chip-total { background: #1e2230; }
  .chip-foto  { background: #0a2e1e; color: #00bf8f; }
  .chip-rojo  { background: #2e0a0a; color: #f04040; }
  .chip-amarillo { background: #2e2500; color: #f0b040; }

  /* TABLA GENERICA */
  .tbl-head { display: grid; gap: 4px; padding: 6px 4px; border-bottom: 1px solid #2a2f3e; margin-bottom: 6px; }
  .tbl-head span { font-size: 11px; color: #00bf8f; font-weight: bold; }
  .tbl-row  { display: grid; gap: 4px; background: #1e2230; border-radius: 6px; padding: 8px 4px; margin-bottom: 4px; font-size: 11px; align-items: center; }
  .tbl-row .muted { color: #8a9099; }
  .tbl-row .verde { color: #00bf8f; text-align: center; }
  .tbl-row .rojo  { color: #f04040; text-align: center; font-weight: bold; }
  .tbl-row .center { text-align: center; }
  .badge-rojo   { background: #2e0a0a; color: #f04040; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge-verde  { background: #0a2e1e; color: #00bf8f; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .badge-gris   { background: #1e2230; color: #8a9099; padding: 2px 7px; border-radius: 4px; font-size: 11px; }

  .btn-refresh { background: #1e2230; border: none; color: #f0f0f0; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .seccion-vacia { color: #8a9099; font-size: 13px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h1>Inventario Displays</h1>
  <input type="text" id="inp-usuario" placeholder="Usuario" autocomplete="off">
  <input type="password" id="inp-password" placeholder="Contraseña">
  <div class="error" id="login-error"></div>
  <button class="btn btn-verde" onclick="doLogin()">Ingresar</button>
</div>

<!-- TIENDAS -->
<div id="tiendas" class="screen">
  <div class="header">
    <h2>Seleccionar Tienda</h2>
    <button id="btn-panel" class="btn-azul btn" style="width:auto;padding:8px 14px;display:none;" onclick="irPanel()">Panel admin</button>
  </div>
  <input type="text" class="search" id="buscar-tienda" placeholder="Buscar tienda..." oninput="filtrarTiendas()">
  <div class="subtexto" id="status-tiendas">Cargando...</div>
  <div id="lista-tiendas"></div>
</div>

<!-- PRODUCTOS -->
<div id="productos" class="screen">
  <div class="header">
    <button class="back" onclick="irTiendas()">←</button>
    <h2 id="titulo-tienda"></h2>
  </div>
  <div class="subtexto" id="status-productos"></div>
  <div class="tabla-header">
    <span>Producto</span><span>Cant.</span><span>Foto</span><span>Comentario</span>
  </div>
  <div id="lista-productos"></div>
  <button class="btn btn-verde btn-enviar" onclick="enviarTodos()">✓ Enviar todos los reportes</button>
  <div class="status-envio" id="status-envio"></div>
</div>

<!-- PANEL SUPERVISOR -->
<div id="panel" class="screen">
  <div class="header">
    <button class="back" onclick="irTiendas()">←</button>
    <h2>Panel supervisor</h2>
    <button class="btn-refresh" onclick="cargarPanel()">↻</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab activo" onclick="cambiarTab('tab-reportes',this)">Reportes</button>
    <button class="tab" onclick="cambiarTab('tab-tiendas',this)">Por tienda</button>
    <button class="tab" onclick="cambiarTab('tab-criticos',this)">Críticos</button>
    <button class="tab" onclick="cambiarTab('tab-displays',this)">Displays</button>
  </div>

  <!-- TAB REPORTES -->
  <div id="tab-reportes">
    <div class="chips">
      <div class="chip chip-total" id="chip-total">0 reportes</div>
      <div class="chip chip-foto"  id="chip-foto">0 con foto</div>
      <div class="chip chip-rojo"  id="chip-rojo">0 sin stock</div>
    </div>
    <div class="tbl-head" style="grid-template-columns:1fr 1fr 60px 40px;">
      <span>Tienda</span><span>Producto</span><span>Coment.</span><span>Foto</span>
    </div>
    <div id="lista-reportes"></div>
  </div>

  <!-- TAB POR TIENDA -->
  <div id="tab-tiendas" style="display:none;">
    <div class="subtexto" style="margin-bottom:10px;">Resumen de reportes por tienda</div>
    <div class="tbl-head" style="grid-template-columns:1fr 50px 50px 50px;">
      <span>Tienda</span><span>Visitas</span><span>Sin stk</span><span>Fotos</span>
    </div>
    <div id="lista-por-tienda"></div>
  </div>

  <!-- TAB CRÍTICOS -->
  <div id="tab-criticos" style="display:none;">
    <div class="subtexto" style="margin-bottom:10px;">Productos con más reportes de stock 0</div>
    <div class="tbl-head" style="grid-template-columns:1fr 70px;">
      <span>Producto</span><span>Veces sin stk</span>
    </div>
    <div id="lista-criticos"></div>
  </div>

  <!-- TAB DISPLAYS -->
  <div id="tab-displays" style="display:none;">
    <div class="subtexto" style="margin-bottom:10px;">Actividad por display</div>
    <div id="lista-displays"></div>
  </div>
</div>

<script>
const API = '';
let usuario = {};
let tiendas = [];
let filas = [];
let tiendaActual = '';
let todosReportes = [];

function mostrar(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function cambiarTab(id, btn) {
  ['tab-reportes','tab-tiendas','tab-criticos','tab-displays'].forEach(t => {
    document.getElementById(t).style.display = 'none';
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
  document.getElementById(id).style.display = 'block';
  btn.classList.add('activo');
}

async function doLogin() {
  const u = document.getElementById('inp-usuario').value.trim();
  const p = document.getElementById('inp-password').value.trim();
  document.getElementById('login-error').textContent = 'Verificando...';
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({usuario: u, password: p})
    });
    const data = await r.json();
    if (data.ok) {
      usuario = data;
      document.getElementById('login-error').textContent = '';
      document.getElementById('btn-panel').style.display = data.rol === 'supervisor' ? 'block' : 'none';
      mostrar('tiendas');
      cargarTiendas();
    } else {
      document.getElementById('login-error').textContent = data.error || 'Error al ingresar';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'Sin conexión con el servidor';
  }
}

async function cargarTiendas() {
  document.getElementById('status-tiendas').textContent = 'Cargando tiendas...';
  const r = await fetch(API + '/api/tiendas');
  tiendas = await r.json();
  document.getElementById('status-tiendas').textContent = tiendas.length + ' tiendas';
  filtrarTiendas();
}

function filtrarTiendas() {
  const txt = document.getElementById('buscar-tienda').value.toLowerCase();
  const lista = document.getElementById('lista-tiendas');
  lista.innerHTML = '';
  tiendas.filter(t => t.toLowerCase().includes(txt)).forEach(t => {
    const d = document.createElement('div');
    d.className = 'tienda-item';
    d.textContent = t;
    d.onclick = () => irProductos(t);
    lista.appendChild(d);
  });
}

function irTiendas() { mostrar('tiendas'); }
function irPanel()   { mostrar('panel'); cargarPanel(); }

async function irProductos(tienda) {
  tiendaActual = tienda;
  document.getElementById('titulo-tienda').textContent = tienda;
  document.getElementById('status-productos').textContent = 'Cargando...';
  document.getElementById('status-envio').textContent = '';
  document.getElementById('lista-productos').innerHTML = '';
  filas = [];
  mostrar('productos');
  const r = await fetch(API + '/api/productos/' + encodeURIComponent(tienda));
  const productos = await r.json();
  document.getElementById('status-productos').textContent = productos.length + ' productos';
  const lista = document.getElementById('lista-productos');
  productos.forEach((p, i) => {
    filas.push({nombre: p.nombre, cantidad: p.cantidad, foto_b64: '', comentario: ''});
    const fila = document.createElement('div');
    fila.className = 'fila';
    fila.innerHTML = `
      <div class="nombre">${p.nombre}</div>
      <div class="cant ${p.cantidad == 0 ? 'cero' : ''}">${p.cantidad}</div>
      <button class="btn-foto" id="foto-${i}" onclick="selFoto(${i})">📷</button>
      <textarea placeholder="Comentario..." oninput="filas[${i}].comentario=this.value"></textarea>
    `;
    lista.appendChild(fila);
  });
}

function selFoto(i) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      filas[i].foto_b64 = ev.target.result.split(',')[1];
      const btn = document.getElementById('foto-' + i);
      btn.textContent = '✓'; btn.classList.add('ok');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

async function enviarTodos() {
  document.getElementById('status-envio').textContent = 'Enviando...';
  let enviados = 0;
  for (const fd of filas) {
    try {
      const r = await fetch(API + '/api/reporte', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({tienda: tiendaActual, producto: fd.nombre,
          comentario: fd.comentario, foto: fd.foto_b64, usuario: usuario.nombre || ''})
      });
      const d = await r.json();
      if (d.ok) enviados++;
    } catch(e) {}
  }
  document.getElementById('status-envio').textContent = '✓ ' + enviados + '/' + filas.length + ' reportes enviados';
  document.getElementById('status-envio').style.color = '#00bf8f';
}

async function cargarPanel() {
  const r = await fetch(API + '/api/reportes');
  todosReportes = await r.json();
  renderReportes();
  renderPorTienda();
  renderCriticos();
  renderDisplays();
}

function renderReportes() {
  const reps = todosReportes;
  const conFoto  = reps.filter(r => r.foto).length;
  const sinStock = reps.filter(r => !r.foto && r.comentario === '').length;
  document.getElementById('chip-total').textContent = reps.length + ' reportes';
  document.getElementById('chip-foto').textContent  = conFoto + ' con foto';
  document.getElementById('chip-rojo').textContent  = sinStock + ' sin comentario';
  const lista = document.getElementById('lista-reportes');
  lista.innerHTML = '';
  if (!reps.length) { lista.innerHTML = '<div class="seccion-vacia">No hay reportes aún</div>'; return; }
  reps.forEach(rep => {
    const d = document.createElement('div');
    d.className = 'tbl-row';
    d.style.gridTemplateColumns = '1fr 1fr 60px 40px';
    d.innerHTML = `
      <div>${rep.tienda}</div>
      <div>${rep.producto}</div>
      <div class="muted">${rep.comentario || '—'}</div>
      <div class="${rep.foto ? 'verde' : 'muted'}">${rep.foto ? '✓' : '—'}</div>
    `;
    lista.appendChild(d);
  });
}

function renderPorTienda() {
  const mapa = {};
  todosReportes.forEach(r => {
    if (!mapa[r.tienda]) mapa[r.tienda] = {visitas: 0, sinStock: 0, fotos: 0};
    mapa[r.tienda].visitas++;
    if (r.foto) mapa[r.tienda].fotos++;
  });
  const lista = document.getElementById('lista-por-tienda');
  lista.innerHTML = '';
  const ordenado = Object.entries(mapa).sort((a,b) => b[1].visitas - a[1].visitas);
  if (!ordenado.length) { lista.innerHTML = '<div class="seccion-vacia">Sin datos</div>'; return; }
  ordenado.forEach(([tienda, d]) => {
    const row = document.createElement('div');
    row.className = 'tbl-row';
    row.style.gridTemplateColumns = '1fr 50px 50px 50px';
    row.innerHTML = `
      <div>${tienda}</div>
      <div class="center">${d.visitas}</div>
      <div class="rojo">${d.sinStock}</div>
      <div class="verde">${d.fotos}</div>
    `;
    lista.appendChild(row);
  });
}

function renderCriticos() {
  const conteo = {};
  todosReportes.forEach(r => {
    if (!r.foto && !r.comentario) return;
    conteo[r.producto] = (conteo[r.producto] || 0) + 1;
  });
  const lista = document.getElementById('lista-criticos');
  lista.innerHTML = '';
  const ordenado = Object.entries(conteo).sort((a,b) => b[1] - a[1]).slice(0, 20);
  if (!ordenado.length) { lista.innerHTML = '<div class="seccion-vacia">Sin datos</div>'; return; }
  ordenado.forEach(([prod, cnt]) => {
    const row = document.createElement('div');
    row.className = 'tbl-row';
    row.style.gridTemplateColumns = '1fr 70px';
    row.innerHTML = `
      <div>${prod}</div>
      <div class="center"><span class="badge-rojo">${cnt}</span></div>
    `;
    lista.appendChild(row);
  });
}

function renderDisplays() {
  const mapa = {};
  todosReportes.forEach(r => {
    const u = r.usuario || 'Desconocido';
    if (!mapa[u]) mapa[u] = {};
    if (!mapa[u][r.tienda]) mapa[u][r.tienda] = {count: 0, ultima: ''};
    mapa[u][r.tienda].count++;
    if (r.fecha > mapa[u][r.tienda].ultima) mapa[u][r.tienda].ultima = r.fecha;
  });
  const lista = document.getElementById('lista-displays');
  lista.innerHTML = '';
  if (!Object.keys(mapa).length) { lista.innerHTML = '<div class="seccion-vacia">Sin datos</div>'; return; }
  Object.entries(mapa).forEach(([disp, tiendasMap]) => {
    const bloque = document.createElement('div');
    bloque.style.marginBottom = '14px';
    const titulo = document.createElement('div');
    titulo.style.cssText = 'font-size:13px;font-weight:bold;color:#00bf8f;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #2a2f3e;';
    titulo.textContent = disp + ' — ' + Object.keys(tiendasMap).length + ' tiendas visitadas';
    bloque.appendChild(titulo);
    Object.entries(tiendasMap).sort((a,b) => b[1].ultima.localeCompare(a[1].ultima)).forEach(([tienda, info]) => {
      const row = document.createElement('div');
      row.className = 'tbl-row';
      row.style.gridTemplateColumns = '1fr 60px 80px';
      const fecha = info.ultima ? info.ultima.substring(0,8).replace(/(\d{4})(\d{2})(\d{2})/, '$3/$2/$1') : '—';
      row.innerHTML = `<div>${tienda}</div><div class="center badge-gris">${info.count} rep.</div><div class="muted center">${fecha}</div>`;
      bloque.appendChild(row);
    });
    lista.appendChild(bloque);
  });
}
</script>
</body>
</html>
